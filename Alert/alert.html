<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
    </style>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>

</head>

<body class="bg-transparent flex items-center justify-center h-screen p-4">
    <div
        class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden transform transition-all animate-in zoom-in duration-300">
        <!-- Header Visual -->
        <div class="w-full flex justify-center items-center mt-6">
            <dotlottie-wc src="https://lottie.host/3b4f0231-fd31-4fc3-bf4e-fb8366e8026e/CuPf8vtqqB.lottie" class="w-120 h-120 mx-auto -translate-x-8" autoplay loop></dotlottie-wc>
        </div>

        <!-- Content -->
        <div class="p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-3">Sabar Ya!</h2>
            <p class="text-gray-600 mb-8 leading-relaxed">
                Buku ini masih dalam tahap <span class="font-bold text-[#1e3a8a]">pengembangan</span>. Tim Mimi n Do
                sedang bekerja keras menyelesaikannya untukmu.
            </p>

            <button onclick="window.parent.closeAlert()"
                class="w-full bg-[#3a5298] hover:bg-[#1e3a8a] text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                Oke, Mengerti
            </button>
        </div>
    </div>

</body>

</html>
