<head>
  <meta charset="UTF-8">
  <title>Buat Cerita</title>

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="global.css">

  <!-- STYLE CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background -->
  <div class="daun-icon">
    <img src="img/imgdaun.png" alt="Background Daun & Angin">
  </div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      
      <!-- Tombol Back -->
      <div class="back-btn">
        <img src="img/imgback.png" alt="Back">
      </div>


    <!-- Icon Library -->
    <div class="library-icon">
      <img src="img/imgfile.png" alt="Library">
    </div>

    <!-- Icon kotak -->
    <div class="kotak-icon">
      <img src="img/imgkotak.png" alt="kotak">
    
        <h1 class="judul-kotak">
    Buat Cerita Kamu
  </h1>

  </div>


    <!-- Upload Area -->
    <section class="upload-box">
      
      <button class="choose-btn">Chose File</button>
      <p>or drag and drop file here</p>

    </section>


    <!-- Upload Button -->
    <div class="upload-button">
      <button>Upload</button>
    </div>

  </div>

</body>
</html>
