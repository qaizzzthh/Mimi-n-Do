<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            font-family: 'Quicksand', sans-serif;
        }

        /* Login Card */
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* Floating shapes decoration */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: loginFloat 6s ease-in-out infinite;
        }

        .login-card::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: loginFloat 8s ease-in-out infinite reverse;
        }

        @keyframes loginFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10px, 15px); }
        }

        /* Input Fields */
        .login-input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .login-input-field {
            width: 100%;
            padding: 1rem 1.25rem;
            background: #ffffff;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif;
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
        }

        .login-input-field::placeholder {
            color: #64748b;
        }

        .login-input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        /* Label animation */
        .login-input-label {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 0.95rem;
            pointer-events: none;
            transition: all 0.3s ease;
            background: #ffffff;
            padding: 0 0.25rem;
            border-radius: 4px;
        }

        .login-input-field:focus + .login-input-label,
        .login-input-field:not(:placeholder-shown) + .login-input-label {
            top: 0;
            font-size: 0.75rem;
            color: #2563eb;
        }

        /* Links */
        .login-link-text {
            color: #2563eb;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .login-link-text::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #2563eb;
            transition: width 0.3s ease;
        }

        .login-link-text:hover::after {
            width: 100%;
        }

        /* Login Button */
        .btn-login-submit {
            width: 100%;
            padding: 1rem 2rem;
            background: #ffc107;
            color: #1e293b;
            font-weight: 600;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .btn-login-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login-submit:hover {
            background: #ffb300;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(255, 193, 7, 0.4);
        }

        .btn-login-submit:hover::before {
            left: 100%;
        }

        .btn-login-submit:active {
            transform: translateY(-1px);
        }

        .btn-login-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Close Button */
        .btn-login-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .btn-login-close:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: rotate(90deg);
        }

        .btn-login-close svg {
            width: 18px;
            height: 18px;
            color: #1e293b;
        }

        /* Password toggle */
        .login-password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            padding: 0.25rem;
            transition: color 0.2s ease;
        }

        .login-password-toggle:hover {
            color: #2563eb;
        }

        /* Login title */
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            color: #1e293b;
            position: relative;
            z-index: 1;
        }

        /* Switch auth text */
        .switch-auth {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: #64748b;
            position: relative;
            z-index: 1;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .login-card::before,
            .login-card::after {
                animation: none;
            }
            .login-card {
                animation: none;
            }
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .login-input-field {
                padding: 0.875rem 1rem;
            }

            .btn-login-submit {
                padding: 0.875rem 1.5rem;
            }

            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Close Button -->
        <button class="btn-login-close" onclick="closeAuth()" aria-label="Tutup modal">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- Login Form -->
        <form id="loginForm">
            <h2 class="login-title">Selamat Datang</h2>

            <!-- Username Input -->
            <div class="login-input-group">
                <input 
                    type="text" 
                    class="login-input-field" 
                    id="loginUsername"
                    placeholder=" "
                    required
                    autocomplete="username"
                >
                <label class="login-input-label" for="loginUsername">Username</label>
            </div>

            <!-- Password Input -->
            <div class="login-input-group">
                <input 
                    type="password" 
                    class="login-input-field" 
                    id="loginPassword"
                    placeholder=" "
                    required
                    autocomplete="current-password"
                    style="padding-right: 3rem;"
                >
                <label class="login-input-label" for="loginPassword">Password</label>
                <button type="button" class="login-password-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
                    <svg id="eyeIconLogin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>

            <!-- Links Row -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                <a href="#" class="login-link-text" onclick="goToRegister()">Buat akun</a>
                <a href="#" class="login-link-text">Lupa Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login-submit" id="btnLoginSubmit">
                Login
            </button>
        </form>

        <!-- Switch to Register -->
        <p class="switch-auth">
            Belum punya akun? <a href="#" class="login-link-text" onclick="goToRegister()">Daftar sekarang</a>
        </p>
    </div>

    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('loginPassword');
            const eyeIcon = document.getElementById('eyeIconLogin');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        // Close Modal
        function closeAuth() {
            parent.postMessage('closeAuth', '*');
        }

        // Go to Register
        function goToRegister() {
            parent.postMessage('openRegister', '*');
        }

        // Handle Form Submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const btn = document.getElementById('btnLoginSubmit');
            
            // Button loading state
            btn.textContent = 'Memproses...';
            btn.disabled = true;
            
            // Simulate login process
            setTimeout(function() {
                // Kirim data ke parent
                parent.postMessage({
                    type: 'loginSuccess',
                    username: username
                }, '*');
                
                // Reset button
                btn.textContent = 'Login';
                btn.disabled = false;
                
                // Reset form
                document.getElementById('loginForm').reset();
            }, 1500);
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAuth();
            }
        });
    </script>
</body>
</html>
