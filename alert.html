<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
    </style>
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>

</head>

<body class="bg-transparent flex items-center justify-center h-screen p-4">
    <dotlottie-wc src="https://lottie.host/3b4f0231-fd31-4fc3-bf4e-fb8366e8026e/CuPf8vtqqB.lottie"
        style="width: 300px;height: 300px" autoplay loop></dotlottie-wc>

    <div
        class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden transform transition-all animate-in zoom-in duration-300">
        <!-- Header Visual -->
        <div class="bg-yellow-400 p-8 text-center">
            <div class="inline-flex bg-white/30 p-4 rounded-full text-white mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
        </div>

        <!-- Content -->
        <div class="p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-3">Sabar Ya!</h2>
            <p class="text-gray-600 mb-8 leading-relaxed">
                Buku ini masih dalam tahap <span class="font-bold text-yellow-600">pengembangan</span>. Tim Mimi n Do
                sedang bekerja keras menyelesaikannya untukmu.
            </p>

            <button onclick="window.parent.closeAlert()"
                class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                Oke, Mengerti
            </button>
        </div>
    </div>

</body>

</html>
