<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimi n Do - Buat Cerita</title>
  <link rel="icon" type="image/png" href="../img/logo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="globals.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <img src="img/imgdaun.png" class="bc">

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navigasi">
    <div class="logo-container">
      <img src="../img/Logo.svg" alt="Logo Mimi n Do" class="logo-normal">
      <img src="../img/logo-mimindo.png" alt="Logo Mimi n Do" class="logo-small">
    </div>

    <div class="menu">
      <div class="menu-item">
        <a href="../index.html">
          <span class="material-symbols-outlined">home</span>
        </a>
        <span class="tooltip">Beranda</span>
      </div>

      <div class="menu-item">
        <a href="../Library/library.html">
          <span class="material-symbols-outlined">menu_book</span>
        </a>
        <span class="tooltip">Perpustakaan</span>
      </div>

      <div class="menu-item">
        <!-- ACTIVE: karena ini halaman buat cerita -->
        <a href="buat.html" class="active">
          <span class="material-symbols-outlined">contract_edit</span>
        </a>
        <span class="tooltip">Tulis</span>
      </div>

      <div class="menu-item">
        <a href="../index.html#section-tentang">
          <span class="material-symbols-outlined">info</span>
        </a>
        <span class="tooltip">Tentang</span>
      </div>
    </div>

    <div class="menu-footer">
      <a class="Masuk" href="#" id="btnAuth">
        <span class="material-symbols-outlined">account_circle</span>
      </a>
    </div>
  </nav>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="buat-container">

    <!-- Header -->
    <header class="buat-header">
      <!-- Judul -->
      <div class="judul-box">
        <h1 class="judul-text">Buat Cerita Kamu</h1>
      </div>

      <!-- Tombol Library -->
      <!-- Hapus inline onclick, akan dihandle via script -->
      <button class="library-btn" aria-label="Buka Library">
        <img src="img/imgfile.png" alt="Library">
      </button>
    </header>

    <!-- Upload Section -->
    <section class="upload-section">

      <!-- Hapus inline onclick di dalamnya, handle via script -->
      <div class="upload-box" id="uploadBoxArea">
        <input type="file" id="fileInput" hidden accept=".txt,.doc,.docx,.pdf">

        <button class="choose-btn" id="chooseFileBtn">
          <span class="material-symbols-outlined">upload_file</span>
          Pilih file
        </button>

        <p class="upload-hint">Atau geser dan letakan disini</p>

        <p id="namaFile" class="file-name"></p>
      </div>

      <button class="upload-action-btn" id="uploadActionBtn">
        <span class="material-symbols-outlined">cloud_upload</span>
        Mengunggah
      </button>

    </section>

  </main>

  <!-- ==================== POPUPS ==================== -->

  <!-- Loading -->
  <div class="loading-box" id="loadingUpload">
    <img src="img/imgloading.png" class="loading-img" alt="Loading...">
  </div>

  <!-- Popup Persen -->
  <div class="popup-persen" id="popupPersen">
    <img src="img/popuppersen.png" class="popup-img" alt="Progress">
  </div>

  <!-- Popup Berhasil -->
  <div class="popup-simpan" id="popupSimpan">
    <img src="img/imgberhasil.png" class="popup-img" alt="Berhasil">
  </div>

  <!-- Popup Harus Login -->
  <div id="popupLogin" style="display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center;">
    <img src="img/haruslogin.png" class="popup-img" alt="Harus Login" style="cursor: pointer; max-width: 400px; animation: popupAnim 0.3s ease;">
  </div>

  <!-- Popup Belum Pilih File -->
<div class="popup-file" id="popupFile">
  <img src="img/pilihfile.png" class="popup-img" alt="Pilih file dulu">
</div>

  <!-- Login/Register Overlay -->
  <div id="auth-overlay"
    style="display: none; position: fixed; inset: 0; z-index: 100; background: transparent; align-items: center; justify-content: center;">
    <iframe id="auth-frame" src="" style="width: 100%; height: 100%; border: none; background: transparent;"></iframe>
  </div>

  <!-- Script Utama -->
  <script src="script.js"></script>

  <script>
    // ============================================
    // AUTH STATE MANAGEMENT
    // ============================================

    const btnAuth = document.getElementById('btnAuth');
    let currentUser = null;

    // Check login status on page load
    function checkLoginStatus() {
      const user = localStorage.getItem('mimindo_user');
      if (user) {
        currentUser = JSON.parse(user);
        updateAuthButton(true);
      } else {
        currentUser = null;
        updateAuthButton(false);
      }
    }

    // Update Auth Button UI
    function updateAuthButton(isLoggedIn) {
      if (isLoggedIn && currentUser) {
        btnAuth.innerHTML = '<span class="material-symbols-outlined">account_circle</span>';
        btnAuth.href = '../Profil/profil.html';
        btnAuth.classList.add('logged-in');
        btnAuth.onclick = null;
      } else {
        btnAuth.innerHTML = '<span class="material-symbols-outlined">account_circle</span>';
        btnAuth.href = '#';
        btnAuth.classList.remove('logged-in');
        btnAuth.onclick = function (e) {
          e.preventDefault();
          showAuth('../Profil/login.html');
        };
      }
    }

    // Save user to localStorage
    function saveUser(username) {
      const user = {
        username: username,
        uid: generateUID(),
        loginTime: new Date().toISOString()
      };
      localStorage.setItem('mimindo_user', JSON.stringify(user));
      currentUser = user;
      return user;
    }

    // Generate random UID
    function generateUID() {
      return Math.floor(10000000 + Math.random() * 90000000).toString();
    }

    // ============================================
    // AUTH MODAL FUNCTIONALITY (LOGIN & REGISTER)
    // ============================================

    const authOverlay = document.getElementById('auth-overlay');
    const authFrame = document.getElementById('auth-frame');

    // Show Auth Modal
    function showAuth(page) {
      authFrame.src = page;
      authOverlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    // Close Auth Modal
    function closeAuth() {
      authOverlay.style.display = 'none';
      authFrame.src = '';
      document.body.style.overflow = '';
    }

    // Click di luar iframe → tutup
    authOverlay.addEventListener('click', function (e) {
      if (e.target === authOverlay) {
        closeAuth();
      }
    });

    // Listener pesan dari iframe login/register
    window.addEventListener('message', function (e) {
      if (e.data === 'closeAuth') {
        closeAuth();
      }

      if (e.data === 'openLogin') {
        authFrame.src = '../Profil/login.html';
      }

      if (e.data === 'openRegister') {
        authFrame.src = '../Profil/register.html';
      }

      if (e.data && e.data.type === 'loginSuccess') {
        saveUser(e.data.username);
        updateAuthButton(true);
        closeAuth();
        showNotification('Selamat datang, ' + e.data.username + '!');
      }

      if (e.data && e.data.type === 'registerSuccess') {
        saveUser(e.data.username);
        updateAuthButton(true);
        closeAuth();
        showNotification('Akun berhasil dibuat! Selamat datang, ' + e.data.username + '!');
      }
    });

    // Simple notification
    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: #3a5298;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 99999;
            animation: slideInRight 0.3s ease;
        `;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(function () {
        notification.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(function () {
          notification.remove();
        }, 300);
      }, 3000);
    }

    // Add animation styles
    const notificationStyles = document.createElement('style');
    notificationStyles.textContent = `
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .Masuk.logged-in {
            background: linear-gradient(90deg, #617ed6 0%, #3a5298 100%);
            opacity: 1 !important;
        }
    `;
    document.head.appendChild(notificationStyles);
    // ============================================
    // RESTRICT ACCESS FOR NON-LOGGED IN USERS
    // ============================================

    const popupLogin = document.getElementById('popupLogin');
    function showPopupLogin() {
      popupLogin.style.display = 'flex';
    }

    // Klik pada popup login akan menutup popup dan membuka halaman auth
    if (popupLogin) {
      popupLogin.addEventListener('click', function () {
        popupLogin.style.display = 'none';
        showAuth('../Profil/login.html');
      });
    }

    // Fungsi untuk mengecek login sebelum aksi
    function checkLoginBeforeAction(actionName, callback) {
      if (!currentUser) {
        showPopupLogin();
        return false;
      }
      if (callback) callback();
      return true;
    }

    // 1. Tombol Library
    const libraryBtn = document.querySelector('.library-btn');
    if (libraryBtn) {
      libraryBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (checkLoginBeforeAction('membuka library')) {
          // Panggil fungsi asli dari script.js
          if (typeof bukaLibrary === 'function') {
            bukaLibrary();
          } else {
            window.location.href = 'index.html';
          }
        }
      });
    }

    // 2. Area Upload Box (Klik mana saja)
    const uploadBoxArea = document.getElementById('uploadBoxArea');
    if (uploadBoxArea) {
      uploadBoxArea.addEventListener('click', function (e) {
        if (!currentUser) {
          e.preventDefault();
          e.stopPropagation(); // Stop event dari tombol di dalamnya
          showPopupLogin();
        }
      }, true); // Capture phase: deteksi sebelum sampai ke anak
    }

    // 3. Tombol Upload (jika sudah pilih file)
    const uploadActionBtn = document.getElementById('uploadActionBtn');
    if (uploadActionBtn) {
      uploadActionBtn.addEventListener('click', function (e) {
        if (!currentUser) {
          e.preventDefault();
          showPopupLogin();
          return;
        }
        // Jika sudah login, panggil fungsi uploadFile dari script.js
        if (typeof uploadFile === 'function') {
          uploadFile();
        }
      });
    }

    // Hapus inline onclick dari tombol choose file, biarkan event listener di uploadBoxArea yang handle
    // Atau spesifik handle tombol choose file jika ingin logic berbeda
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    if (chooseFileBtn) {
      chooseFileBtn.removeAttribute('onclick');
      chooseFileBtn.addEventListener('click', function (e) {
        if (!currentUser) {
          e.stopPropagation(); // Biar tidak trigger alert dua kali dari parent
          showPopupLogin();
        } else {
          // Panggil pilihFile dari script.js
          if (typeof pilihFile === 'function') {
            pilihFile();
          } else {
            document.getElementById('fileInput').click();
          }
        }
      });
    }

    // Check login status when page loads
    checkLoginStatus();
  </script>
</body>

</html>
