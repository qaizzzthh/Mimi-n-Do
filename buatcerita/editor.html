<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Cerita - Mimi n Do</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="globals.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <img src="img/imgdaun.png" class="bc">

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navigasi">
    <div class="logo-container">
      <img src="../img/Logo.svg" alt="Logo Mimi n Do" class="logo-normal">
      <img src="../img/logo-mimindo.png" alt="Logo Mimi n Do" class="logo-small">
    </div>

    <div class="menu">
      <div class="menu-item">
        <a href="../index.html">
          <span class="material-symbols-outlined">home</span>
        </a>
        <span class="tooltip">Beranda</span>
      </div>

      <div class="menu-item">
        <a href="../Library/library.html">
          <span class="material-symbols-outlined">menu_book</span>
        </a>
        <span class="tooltip">Perpustakaan</span>
      </div>

      <div class="menu-item">
        <!-- ACTIVE: karena ini bagian dari Tulis Cerita -->
        <a href="buat.html" class="active">
          <span class="material-symbols-outlined">contract_edit</span>
        </a>
        <span class="tooltip">Tulis</span>
      </div>

      <div class="menu-item">
        <a href="../index.html#section-tentang">
          <span class="material-symbols-outlined">info</span>
        </a>
        <span class="tooltip">Tentang</span>
      </div>
    </div>

    <div class="menu-footer">
      <a class="Masuk" href="#" id="btnAuth">
        <span class="material-symbols-outlined">account_circle</span>
      </a>
    </div>
  </nav>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="main-content">

    <!-- Header -->
    <header class="header-editor">
      <button class="back-btn-editor" onclick="tanyaSimpan()" aria-label="Kembali">
        <img src="img/imgback.png" alt="Kembali">
      </button>
    </header>

    <!-- Judul -->
    <div class="kotak-judul-editor">
      <h1>Cerita</h1>
    </div>

    <!-- Editor Box -->
    <div class="editor-box">

      <!-- Tombol Silang (Tutup) -->
      <div class="silang-icon" onclick="tanyaSimpan()">
        <img src="img/imgsilang.png" alt="Tutup">
      </div>

      <!-- Icon Pensil -->
      <div class="pencil-icon">
        <img src="img/pencil.png" alt="">
      </div>

      <!-- Tombol Simpan -->
      <div class="simpan-btn" onclick="simpanCerita()">
        <img src="img/simpan.png" alt="Simpan">
      </div>

      <!-- Input Judul -->
      <input type="text" id="judul" class="input-judul" placeholder="Tulis judul cerita..." maxlength="100">

      <!-- Textarea Cerita -->
      <textarea id="isi" class="input-cerita" placeholder="Tulis cerita kamu..."></textarea>

    </div>

  </main>

  <!-- ==================== POPUPS ==================== -->

  <!-- Popup Konfirmasi -->
  <div class="popup-konfirmasi" id="popupKonfirmasi">
    <div class="popup-box">
      <img src="img/imgbingung.png" class="popup-img2" alt="">
      <h2>Teks ingin disimpan?</h2>
      <div class="popup-btn">
        <button class="btn-tidak" onclick="tidakSimpan()">Tidak</button>
        <button class="btn-ya" onclick="yaSimpan()">Ya</button>
      </div>
    </div>
  </div>

  <!-- Popup Berhasil -->
  <div class="popup-simpan" id="popupSimpan">
    <img src="img/imgberhasil.png" class="popup-img" alt="Berhasil">
  </div>

  <!-- Login/Register Overlay -->
  <div id="auth-overlay"
    style="display: none; position: fixed; inset: 0; z-index: 100; background: transparent; align-items: center; justify-content: center;">
    <iframe id="auth-frame" src="" style="width: 100%; height: 100%; border: none; background: transparent;"></iframe>
  </div>

  <!-- Script -->
  <script src="script.js"></script>

  <script>
    // ============================================
    // AUTH STATE MANAGEMENT
    // ============================================

    const btnAuth = document.getElementById('btnAuth');
    let currentUser = null;

    // Check login status on page load
    function checkLoginStatus() {
      const user = localStorage.getItem('mimindo_user');
      if (user) {
        currentUser = JSON.parse(user);
        updateAuthButton(true);
      } else {
        currentUser = null;
        updateAuthButton(false);
      }
    }

    // Update Auth Button UI
    function updateAuthButton(isLoggedIn) {
      if (isLoggedIn && currentUser) {
        // Change button to profile link
        btnAuth.innerHTML = '<span class="material-symbols-outlined">account_circle</span>';
        btnAuth.href = '../Profil/profil.html';
        btnAuth.classList.add('logged-in');
        btnAuth.onclick = null;
      } else {
        // Reset to login button
        btnAuth.innerHTML = '<span class="material-symbols-outlined">account_circle</span>';
        btnAuth.href = '#';
        btnAuth.classList.remove('logged-in');
        btnAuth.onclick = function (e) {
          e.preventDefault();
          showAuth('../Profil/login.html');
        };
      }
    }

    // Save user to localStorage
    function saveUser(username) {
      const user = {
        username: username,
        uid: generateUID(),
        loginTime: new Date().toISOString()
      };
      localStorage.setItem('mimindo_user', JSON.stringify(user));
      currentUser = user;
      return user;
    }

    // Generate random UID
    function generateUID() {
      return Math.floor(10000000 + Math.random() * 90000000).toString();
    }

    // ============================================
    // AUTH MODAL FUNCTIONALITY (LOGIN & REGISTER)
    // ============================================

    const authOverlay = document.getElementById('auth-overlay');
    const authFrame = document.getElementById('auth-frame');

    // Show Auth Modal
    function showAuth(page) {
      authFrame.src = page;
      authOverlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    // Close Auth Modal
    function closeAuth() {
      authOverlay.style.display = 'none';
      authFrame.src = '';
      document.body.style.overflow = '';
    }

    // Click di luar iframe → tutup
    authOverlay.addEventListener('click', function (e) {
      if (e.target === authOverlay) {
        closeAuth();
      }
    });

    // Listener pesan dari iframe login/register
    window.addEventListener('message', function (e) {
      // Close auth modal
      if (e.data === 'closeAuth') {
        closeAuth();
      }

      // Open Login page
      if (e.data === 'openLogin') {
        authFrame.src = '../Profil/login.html';
      }

      // Open Register page
      if (e.data === 'openRegister') {
        authFrame.src = '../Profil/register.html';
      }

      // Login success
      if (e.data && e.data.type === 'loginSuccess') {
        saveUser(e.data.username);
        updateAuthButton(true);
        closeAuth();

        // Show welcome message
        showNotification('Selamat datang, ' + e.data.username + '!');
      }

      // Register success
      if (e.data && e.data.type === 'registerSuccess') {
        saveUser(e.data.username);
        updateAuthButton(true);
        closeAuth();

        // Show success message
        showNotification('Akun berhasil dibuat! Selamat datang, ' + e.data.username + '!');
      }
    });

    // Simple notification
    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: #3a5298;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 99999;
            animation: slideInRight 0.3s ease;
        `;
      notification.textContent = message;
      document.body.appendChild(notification);

      setTimeout(function () {
        notification.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(function () {
          notification.remove();
        }, 300);
      }, 3000);
    }

    // Add animation styles
    const notificationStyles = document.createElement('style');
    notificationStyles.textContent = `
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .Masuk.logged-in {
            background: linear-gradient(90deg, #617ed6 0%, #3a5298 100%);
            opacity: 1 !important;
        }
    `;
    document.head.appendChild(notificationStyles);

    // Check login status when page loads
    checkLoginStatus();
  </script>
</body>

</html>
